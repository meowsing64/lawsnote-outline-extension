<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744"/>
      <stop offset="100%" style="stop-color:#0f1a30"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c66a"/>
      <stop offset="100%" style="stop-color:#c49530"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 深藏藍背景 -->
  <rect width="128" height="128" rx="24" fill="url(#bg2)"/>

  <!-- 金色星球圓（社群頭像風格） -->
  <circle cx="64" cy="56" r="36" fill="#d4a843" opacity="0.1"/>
  <circle cx="64" cy="56" r="36" fill="none" stroke="#d4a843" stroke-width="1.8" opacity="0.5"/>

  <!-- 軌道環 -->
  <ellipse cx="64" cy="56" rx="46" ry="14" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.35" transform="rotate(-25, 64, 56)"/>

  <!-- 軌道小球 -->
  <circle cx="18" cy="44" r="3" fill="#d4a843" opacity="0.4"/>
  <circle cx="108" cy="36" r="2" fill="#e8c66a" opacity="0.35"/>
  <circle cx="28" cy="26" r="1.5" fill="#d4a843" opacity="0.25"/>

  <!-- ===== 三花貓（中央主角） ===== -->
  <!-- 左耳 -->
  <polygon points="42,44 34,18 56,36" fill="#e0924a"/>
  <polygon points="44,43 38,26 54,37" fill="#f8e8d4" opacity="0.5"/>
  <!-- 右耳 -->
  <polygon points="86,44 94,18 72,36" fill="#333333"/>
  <polygon points="84,43 90,26 74,37" fill="#f8e8d4" opacity="0.4"/>

  <!-- 臉部 -->
  <ellipse cx="64" cy="58" rx="24" ry="22" fill="#f8f0e4"/>

  <!-- 三花斑紋 -->
  <!-- 左臉橘斑 -->
  <path d="M40,50 Q42,38 52,36 Q48,48 44,58 Q40,58 40,50 Z" fill="#e0924a" opacity="0.45"/>
  <ellipse cx="52" cy="44" rx="6" ry="3.5" fill="#e0924a" opacity="0.35"/>
  <!-- 右臉黑斑 -->
  <path d="M88,50 Q86,38 76,36 Q80,48 84,58 Q88,58 88,50 Z" fill="#333" opacity="0.3"/>
  <ellipse cx="78" cy="43" rx="4" ry="3" fill="#333" opacity="0.2"/>
  <!-- 額頭中央小橘 -->
  <ellipse cx="64" cy="42" rx="3" ry="2" fill="#e0924a" opacity="0.25"/>

  <!-- 眼睛（綠瞳，參考真貓） -->
  <ellipse cx="54" cy="55" rx="5.5" ry="6" fill="#1a2744"/>
  <ellipse cx="74" cy="55" rx="5.5" ry="6" fill="#1a2744"/>
  <ellipse cx="54" cy="55" rx="4" ry="4.5" fill="#6a9a5a"/>
  <ellipse cx="74" cy="55" rx="4" ry="4.5" fill="#6a9a5a"/>
  <ellipse cx="54" cy="55" rx="2" ry="3.5" fill="#3a6a3a"/>
  <ellipse cx="74" cy="55" rx="2" ry="3.5" fill="#3a6a3a"/>
  <!-- 高光 -->
  <circle cx="52" cy="53" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="72" cy="53" r="1.5" fill="white" opacity="0.75"/>

  <!-- 鼻子（粉色+黑斑如真貓） -->
  <path d="M62,64 L64,67.5 L66,64 Z" fill="#e8a088"/>
  <circle cx="65.5" cy="64.5" r="1.3" fill="#333" opacity="0.5"/>

  <!-- 嘴 -->
  <path d="M64,67.5 Q59,72 55,70" fill="none" stroke="#c4a088" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M64,67.5 Q69,72 73,70" fill="none" stroke="#c4a088" stroke-width="0.9" stroke-linecap="round"/>

  <!-- 鬍鬚 -->
  <line x1="36" y1="60" x2="50" y2="63" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <line x1="36" y1="66" x2="50" y2="66" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <line x1="78" y1="63" x2="92" y2="60" stroke="white" stroke-width="0.5" opacity="0.35"/>
  <line x1="78" y1="66" x2="92" y2="66" stroke="white" stroke-width="0.5" opacity="0.35"/>

  <!-- ===== 底部：三貓剪影（事務所 logo 概念） ===== -->
  <!-- 左小貓剪影 -->
  <g opacity="0.55">
    <path d="M30,104 L27,94 L33,98 Q35,97 37,98 L43,94 L40,104 Q42,106 42,108 L42,112 L28,112 L28,108 Q28,106 30,104 Z" fill="url(#gold2)"/>
  </g>

  <!-- 中貓剪影（稍大） -->
  <g opacity="0.65">
    <path d="M54,100 L50,88 L58,94 Q61,92 67,92 Q70,92 72,94 L80,88 L76,100 Q78,103 78,106 L78,112 L52,112 L52,106 Q52,103 54,100 Z" fill="url(#gold2)"/>
  </g>

  <!-- 右小貓剪影 -->
  <g opacity="0.55">
    <path d="M88,104 L85,94 L91,98 Q93,97 95,98 L101,94 L98,104 Q100,106 100,108 L100,112 L86,112 L86,108 Q86,106 88,104 Z" fill="url(#gold2)"/>
  </g>

  <!-- 星星點綴 -->
  <polygon points="110,14 111.5,18 116,18 112.5,21 113.5,25 110,22 106.5,25 107.5,21 104,18 108.5,18"
    fill="#e8c66a" opacity="0.5" filter="url(#glow2)"/>
  <circle cx="16" cy="16" r="1.2" fill="#d4a843" opacity="0.4"/>
</svg>
